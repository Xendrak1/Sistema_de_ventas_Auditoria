{% extends "base.html" %}
{% block content %}
<section class="toolbar">
  <h1>Ventas</h1>
</section>

<form method="post" class="compact-form">
  <select name="cliente_id" required>
    {% for cliente in clientes %}
      <option value="{{ cliente.id }}">{{ cliente.nombre }}</option>
    {% endfor %}
  </select>
  <select name="producto_id" required>
    {% for producto in productos %}
      <option value="{{ producto.id }}">{{ producto.nombre }} - Bs {{ "%.2f"|format(producto.precio) }}</option>
    {% endfor %}
  </select>
  <input name="cantidad" type="number" min="1" value="1" required>
  <button type="submit">Registrar venta</button>
</form>

<div class="table-wrap">
  <table>
    <thead>
      <tr><th>ID</th><th>Cliente</th><th>Producto</th><th>Cantidad</th><th>Total</th><th>Fecha</th></tr>
    </thead>
    <tbody>
    {% for venta in ventas %}
      <tr>
        <td>{{ venta.id }}</td>
        <td>{{ venta.cliente }}</td>
        <td>{{ venta.producto }}</td>
        <td>{{ venta.cantidad }}</td>
        <td>Bs {{ "%.2f"|format(venta.total) }}</td>
        <td>{{ venta.fecha }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
