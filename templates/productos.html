{% extends "base.html" %}
{% block content %}
<section class="toolbar">
  <h1>Productos</h1>
  <a class="button" href="{{ url_for('nuevo_producto') }}">Nuevo producto</a>
</section>

<div class="table-wrap">
  <table>
    <thead>
      <tr><th>ID</th><th>Nombre</th><th>Descripcion</th><th>Precio</th><th>Stock</th></tr>
    </thead>
    <tbody>
    {% for producto in productos %}
      <tr>
        <td>{{ producto.id }}</td>
        <td>{{ producto.nombre }}</td>
        <td>{{ producto.descripcion|safe }}</td>
        <td>Bs {{ "%.2f"|format(producto.precio) }}</td>
        <td>{{ producto.stock }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
